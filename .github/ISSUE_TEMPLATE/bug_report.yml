name: Bug report
description: Report a broken behavior in pls
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what you expected and what happened instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pls version
      placeholder: "pls 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - bash
        - zsh
        - fish
        - pwsh
        - nu
        - other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
        - other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include the previous command, the `pls` invocation, and the output.
    validations:
      required: true

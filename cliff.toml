[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{% if version %}## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}
- {{ commit.message | trim }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = []

[commit_parsers]
message = "^:sparkles:"
group = "Added"

[[commit_parsers]]
message = "^:bug:"
group = "Fixed"

[[commit_parsers]]
message = "^:recycle:"
group = "Changed"

[[commit_parsers]]
message = "^:test_tube:"
group = "Tests"

[[commit_parsers]]
message = "^:books:"
group = "Docs"

[[commit_parsers]]
message = "^:wrench:"
group = "Chore"
